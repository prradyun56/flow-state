<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-section">
    <div class="user-info-container">
      <span id="user-email" class="user-info">NOT_CONNECTED</span>
      <span id="last-sync" class="last-sync">--/--</span>
    </div>
    <button id="dashboard-btn" class="icon-btn dashboard-btn" title="Open Dashboard">⚙</button>
    <button id="auth-btn" class="icon-btn" title="Sign In">[AUTH]</button>
    <button id="sync-btn" class="icon-btn sync-btn" title="Force Sync">⟳</button>
    <span id="live-indicator" class="live-indicator" title="Live sync active"><span class="live-dot"></span>LIVE</span>
    <span id="sync-status" class="sync-icon" title="Sync status">●</span>
  </div>

  <div class="header">
    <div class="logo">FLOWSTATE</div>
    <div class="tab-count" id="tab-count">0_TABS</div>
    <span id="recording-indicator" class="recording-indicator" style="display:none;"><span class="rec-dot"></span> REC</span>
  </div>

  <div class="save-section">
    <input type="text" id="session-name" placeholder="SESSION_ID...">
    <textarea id="session-notes" placeholder="NOTES..."></textarea>
    <select id="session-visibility" class="privacy-input" style="margin-bottom: 10px;">
      <option value="private">Visibility: Private</option>
      <option value="read">Visibility: Shared (Read-Only)</option>
      <option value="edit">Visibility: Shared (Editable)</option>
    </select>
    <button id="save-btn" class="btn primary-btn">New Session</button>
    <button id="stop-rec-btn" class="btn stop-rec-btn" style="display:none;">STOP_RECORDING()</button>
  </div>

  <div class="privacy-section" id="privacy-section">
    <div class="privacy-header" id="privacy-toggle">
      <span class="privacy-title">PRIVACY_FILTER()</span>
      <span id="privacy-summary" class="privacy-summary"></span>
      <button class="icon-btn privacy-expand-btn" id="privacy-expand-btn">▾</button>
    </div>
    <div id="privacy-panel" class="privacy-panel privacy-panel-hidden">
      <div id="current-tab-status" class="privacy-tab-status"></div>
      <button id="flag-tab-btn" class="btn privacy-btn">FLAG_THIS_TAB()</button>
    </div>
  </div>

  <div class="search-section">
    <input type="text" id="session-search" class="search-input" placeholder="SEARCH_SESSIONS()...">
  </div>

  <div id="toast" class="toast hidden"></div>

  <div class="sessions-list" id="sessions-list">
    <!-- Session cards go here -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
