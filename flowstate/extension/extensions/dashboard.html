<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowState — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-text">FLOWSTATE</span>
      <span class="brand-sub">DASHBOARD</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-section="sessions"><span class="nav-icon">❏</span><span class="nav-label">Sessions</span></button>
      <button class="nav-item" data-section="organizations"><span class="nav-icon">⊞</span><span class="nav-label">Organizations</span></button>
      <button class="nav-item" data-section="members"><span class="nav-icon">👥</span><span class="nav-label">Members</span></button>
      <button class="nav-item" data-section="roles"><span class="nav-icon">🎭</span><span class="nav-label">Roles</span></button>
      <button class="nav-item" data-section="invites"><span class="nav-icon">🔗</span><span class="nav-label">Invites</span></button>
      <button class="nav-item" data-section="privacy"><span class="nav-icon">🔐</span><span class="nav-label">Privacy</span></button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user-info">
        <span id="sidebar-user-email" class="sidebar-user-email">Not signed in</span>
        <span id="sidebar-user-role" class="sidebar-user-role"></span>
      </div>
      <button id="sidebar-logout-btn" class="sidebar-logout-btn" title="Logout">⏻</button>
    </div>
  </aside>

  <main class="main-panel" id="main-panel">
    <section class="view-section active" id="view-sessions">
      <div class="view-header"><h1 class="view-title">Sessions</h1>
        <input type="text" id="dash-session-search" class="dash-input" placeholder="Search sessions...">
      </div>
      <div class="session-grid" id="dash-sessions-list"><div class="empty-state">Loading…</div></div>
    </section>

    <section class="view-section" id="view-organizations">
      <div class="view-header"><h1 class="view-title">Organizations</h1>
        <button id="dash-create-org-btn" class="dash-btn dash-btn-primary">+ New Workspace</button>
      </div>
      <div class="org-grid" id="dash-org-list"><div class="empty-state">Loading…</div></div>
    </section>

    <section class="view-section" id="view-members">
      <div class="view-header"><h1 class="view-title">Members</h1>
        <input type="text" id="dash-member-search" class="dash-input" placeholder="Search members...">
      </div>
      <div id="dash-members-list"><div class="empty-state">Loading…</div></div>
    </section>

    <section class="view-section" id="view-roles">
      <div class="view-header"><h1 class="view-title">Roles & Permissions</h1></div>
      <div class="roles-grid" id="dash-roles-list"><div class="empty-state">Loading…</div></div>
    </section>

    <section class="view-section" id="view-invites">
      <div class="view-header"><h1 class="view-title">Invite Members</h1></div>
      <div class="invite-panel">
        <div class="invite-form">
          <label class="dash-label">Role</label>
          <select id="dash-invite-role" class="dash-select"></select>
          <button id="dash-create-invite-btn" class="dash-btn dash-btn-primary" style="margin-top:16px;">Generate Invite Link</button>
        </div>
        <div id="dash-invite-result" class="invite-result" style="display:none;">
          <label class="dash-label">Invite Link</label>
          <div class="invite-link-box">
            <input type="text" id="dash-invite-link" class="dash-input" readonly>
            <button id="dash-copy-invite" class="dash-btn">Copy</button>
          </div>
        </div>
      </div>
    </section>

    <section class="view-section" id="view-privacy">
      <div class="view-header"><h1 class="view-title">Privacy Settings</h1></div>
      <div class="privacy-dash-grid">
        <div class="dash-card">
          <h2 class="dash-card-title">Flagged Domains</h2>
          <p class="dash-card-desc">Tabs on these domains are excluded from recording.</p>
          <div class="domain-add-row">
            <input type="text" id="dash-domain-input" class="dash-input" placeholder="e.g. bank.com">
            <button id="dash-add-domain-btn" class="dash-btn dash-btn-primary">+ Add</button>
          </div>
          <div id="dash-domain-list" class="domain-list"></div>
        </div>
        <div class="dash-card">
          <h2 class="dash-card-title">Flagged Tabs</h2>
          <p class="dash-card-desc">Individual tabs currently excluded from recording.</p>
          <div id="dash-flagged-tabs-list" class="domain-list"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="dash-toast" class="dash-toast hidden"></div>
  <script src="dashboard.js"></script>
</body>
</html>
