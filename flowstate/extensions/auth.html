<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>FlowState - Sign In</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100vh;
      width: 100vw;
      max-height: none;
      overflow-x: hidden;
      margin: 0;
      background: radial-gradient(circle at top left, #1a202c 0%, #0d0f11 60%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .auth-container {
      padding: 60px;
      width: 100%;
      max-width: 480px;
      margin: 0 20px;
      background: rgba(26, 26, 26, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-header h2 {
      color: #00e5a0;
      margin: 0 0 12px 0;
      font-size: 34px;
      letter-spacing: 1px;
    }

    .auth-header p {
      color: #888;
      margin: 0;
      font-size: 16px;
    }

    .auth-button {
      width: 100%;
      padding: 16px 20px;
      margin: 12px 0;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 17px;
      font-weight: 700;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .auth-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 229, 160, 0.3);
    }

    .auth-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .google-btn {
      background: #4285f4;
      color: white;
    }

    .email-btn {
      background: #00e5a0;
      color: #0d0f11;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      color: #666;
      font-size: 12px;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #333;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .email-form {
      margin-top: 20px;
    }

    .input-field {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0d0f11;
      color: #fff;
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: #00e5a0;
      box-shadow: 0 0 0 2px rgba(0, 229, 160, 0.1);
    }

    .toggle-link {
      text-align: center;
      margin-top: 24px;
      font-size: 15px;
      color: #888;
    }

    .toggle-link a {
      color: #00e5a0;
      text-decoration: none;
      cursor: pointer;
      font-weight: 600;
    }

    .toggle-link a:hover {
      text-decoration: underline;
    }

    .error-message {
      color: #ff6b6b;
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-header">
      <h2>◈ FlowState</h2>
      <p>Sync your sessions across devices</p>
    </div>

    <div class="email-form" style="margin-top: 0;">
      <div id="signin-form">
        <input type="email" id="email" class="input-field" placeholder="Email" autocomplete="email">
        <input type="password" id="password" class="input-field" placeholder="Password" autocomplete="current-password">
        <button id="email-signin" class="auth-button email-btn">Sign In</button>
        <div class="toggle-link">
          Don't have an account? <a id="show-signup">Sign up</a>
        </div>
      </div>

      <div id="signup-form" style="display: none;">
        <input type="email" id="signup-email" class="input-field" placeholder="Email" autocomplete="email">
        <input type="password" id="signup-password" class="input-field" placeholder="Password (min 6 characters)"
          autocomplete="new-password">
        <input type="password" id="signup-confirm" class="input-field" placeholder="Confirm Password"
          autocomplete="new-password">
        <select id="signup-rank" class="input-field">
          <option value="jc">Junior Core (jc) - Auto Approved</option>
          <option value="sc">Senior Core (sc) - Needs Approval</option>
          <option value="board">Board - Needs Approval</option>
        </select>
        <button id="email-signup" class="auth-button email-btn">Create Account</button>
        <div class="toggle-link">
          Already have an account? <a id="show-signin">Sign in</a>
        </div>
      </div>
    </div>

    <div id="error-message" class="error-message"></div>
  </div>

  <script type="module" src="auth.js"></script>
</body>

</html>
