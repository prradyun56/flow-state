<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FlowState - Sign In</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      width: 100% !important;
      height: 100vh !important;
      max-height: none !important;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Background comes from styles.css */
    }

    .auth-container {
      padding: 40px;
      width: 100%;
      max-width: 400px;
      /* Glassmorphism to match popup */
      background: var(--glass-bg, rgba(15, 15, 15, 0.4));
      backdrop-filter: var(--glass-blur, blur(16px));
      -webkit-backdrop-filter: var(--glass-blur, blur(16px));
      border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
      border-radius: 4px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .auth-header h2 {
      color: var(--text-primary, #f0f0f0);
      margin: 0 0 10px 0;
      font-size: 20px;
      letter-spacing: 0.2em;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .auth-header p {
      color: var(--text-secondary, #888);
      margin: 0;
      font-size: 11px;
    }

    .auth-button {
      width: 100%;
      padding: 12px 20px;
      margin: 8px 0;
      border-radius: 2px;
      border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--glass-bg, rgba(15, 15, 15, 0.4));
      color: var(--text-primary, #f0f0f0);
    }

    .auth-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
    }

    .auth-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .google-btn {
      background: rgba(66, 133, 244, 0.1);
      border-color: rgba(66, 133, 244, 0.4);
      color: #fff;
    }
    
    .google-btn:hover {
      background: rgba(66, 133, 244, 0.2);
      box-shadow: 0 0 15px rgba(66, 133, 244, 0.3);
    }

    .email-btn {
      background: rgba(0, 229, 255, 0.1);
      border-color: rgba(0, 229, 255, 0.4);
      color: var(--accent-cyan, #00e5ff);
    }
    
    .email-btn:hover {
      background: rgba(0, 229, 255, 0.2);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      color: var(--text-secondary, #666);
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.2em;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--glass-border, rgba(255,255,255,0.1));
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .email-form { margin-top: 20px; }

    .input-field {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
      border-radius: 2px;
      background: rgba(0,0,0,0.4);
      color: var(--text-primary, #fff);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.1em;
      box-sizing: border-box;
      transition: all 0.3s;
    }
    
    .input-field::placeholder {
      color: #555;
      text-transform: uppercase;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--accent-cyan, #00e5ff);
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.1);
    }

    .toggle-link {
      text-align: center;
      margin-top: 15px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.1em;
      color: var(--text-secondary, #888);
      text-transform: uppercase;
    }

    .toggle-link a {
      color: var(--accent-cyan, #00e5ff);
      text-decoration: none;
      cursor: pointer;
      font-weight: 700;
      margin-left: 4px;
    }

    .toggle-link a:hover {
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
    }

    .error-message {
      color: var(--accent-red, #ff3366);
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 51, 102, 0.1);
      border: 1px solid rgba(255, 51, 102, 0.2);
      border-radius: 2px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      display: none;
    }

    .error-message.show { display: block; }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      border-top-color: var(--accent-cyan, #00e5ff);
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <h2>◈ FlowState</h2>
      <p>Sync your sessions across devices</p>
    </div>

    <button id="google-signin" class="auth-button google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#fff" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
        <path fill="#fff" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#fff" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
        <path fill="#fff" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Sign in with Google
    </button>

    <div class="divider">OR</div>

    <div class="email-form">
      <div id="signin-form">
        <input type="email" id="email" class="input-field" placeholder="Email" autocomplete="email">
        <input type="password" id="password" class="input-field" placeholder="Password" autocomplete="current-password">
        <button id="email-signin" class="auth-button email-btn">Sign In</button>
        <div class="toggle-link">
          Don't have an account? <a id="show-signup">Sign up</a>
        </div>
      </div>

      <div id="signup-form" style="display: none;">
        <input type="email" id="signup-email" class="input-field" placeholder="Email" autocomplete="email">
        <input type="password" id="signup-password" class="input-field" placeholder="Password (min 6 characters)" autocomplete="new-password">
        <input type="password" id="signup-confirm" class="input-field" placeholder="Confirm Password" autocomplete="new-password">
        <button id="email-signup" class="auth-button email-btn">Create Account</button>
        <div class="toggle-link">
          Already have an account? <a id="show-signin">Sign in</a>
        </div>
      </div>
    </div>

    <div id="error-message" class="error-message"></div>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
