<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>FlowState - Sign In</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100vh;
      width: 100vw;
      max-height: none;
      overflow-x: hidden;
      margin: 0;
      /* Clearer background override */
      background: radial-gradient(circle at top left, #2a313e 0%, #0d0f11 80%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-container {
      padding: 60px;
      width: 100%;
      max-width: 480px;
      margin: 0 20px;
      /* Mirroring popup glassmorphism */
      background: var(--glass-bg, rgba(15, 15, 15, 0.4));
      backdrop-filter: var(--glass-blur, blur(16px));
      -webkit-backdrop-filter: var(--glass-blur, blur(16px));
      border-radius: 4px;
      border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 40px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .auth-header h2 {
      color: var(--text-primary, #f0f0f0);
      margin: 0 0 12px 0;
      font-size: 34px;
      letter-spacing: 0.2em;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .auth-header p {
      color: var(--text-secondary, #888);
      margin: 0;
      font-size: 14px;
    }

    .auth-button {
      width: 100%;
      padding: 16px 20px;
      margin: 12px 0;
      border-radius: 2px;
      border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
      cursor: pointer;
      font-size: 17px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--glass-bg, rgba(15, 15, 15, 0.4));
      color: var(--text-primary, #f0f0f0);
    }

    .auth-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
    }

    .auth-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .email-btn {
      background: rgba(0, 229, 255, 0.1);
      border-color: rgba(0, 229, 255, 0.4);
      color: var(--accent-cyan, #00e5ff);
    }
    
    .email-btn:hover {
      background: rgba(0, 229, 255, 0.2);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
    }

    .email-form {
      margin-top: 0;
    }

    .input-field {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
      border-radius: 2px;
      background: rgba(0,0,0,0.4);
      color: var(--text-primary, #fff);
      font-size: 15px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.1em;
      box-sizing: border-box;
      transition: all 0.3s;
    }
    
    .input-field::placeholder {
      color: #555;
      text-transform: uppercase;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--accent-cyan, #00e5ff);
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.1);
    }

    .toggle-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.1em;
      color: var(--text-secondary, #888);
      text-transform: uppercase;
    }

    .toggle-link a {
      color: var(--accent-cyan, #00e5ff);
      text-decoration: none;
      cursor: pointer;
      font-weight: 700;
      margin-left: 4px;
    }

    .toggle-link a:hover {
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-secondary, #555);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--glass-border, rgba(255,255,255,0.1));
    }

    .divider span {
      padding: 0 16px;
    }

    .google-btn {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--text-primary, #f0f0f0);
    }

    .google-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.08);
    }

    .google-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .error-message {
      color: var(--accent-red, #ff3366);
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 51, 102, 0.1);
      border: 1px solid rgba(255, 51, 102, 0.2);
      border-radius: 2px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .loading {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      border-top-color: var(--accent-cyan, #00e5ff);
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-header">
      <h2>◈ FlowState</h2>
      <p>Sync your sessions across devices</p>
    </div>

    <div class="email-form" style="margin-top: 0;">
      <div id="signin-form">
        <input type="email" id="email" class="input-field" placeholder="Email" autocomplete="email">
        <input type="password" id="password" class="input-field" placeholder="Password" autocomplete="current-password">
        <button id="email-signin" class="auth-button email-btn">Sign In</button>
        <div class="toggle-link">
          Don't have an account? <a id="show-signup">Sign up</a>
        </div>
      </div>

      <div id="signup-form" style="display: none;">
        <input type="email" id="signup-email" class="input-field" placeholder="Email" autocomplete="email">
        <input type="password" id="signup-password" class="input-field" placeholder="Password (min 6 characters)"
          autocomplete="new-password">
        <input type="password" id="signup-confirm" class="input-field" placeholder="Confirm Password"
          autocomplete="new-password">
        <select id="signup-rank" class="input-field">
          <option value="jc">Junior Core (jc) - Auto Approved</option>
          <option value="sc">Senior Core (sc) - Needs Approval</option>
          <option value="board">Board - Needs Approval</option>
        </select>
        <button id="email-signup" class="auth-button email-btn">Create Account</button>
        <div class="toggle-link">
          Already have an account? <a id="show-signin">Sign in</a>
        </div>
      </div>
    </div>

    <div class="divider"><span>or</span></div>

    <button id="google-signin" class="auth-button google-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <div id="error-message" class="error-message"></div>
  </div>

  <!-- Position Application (shown for new users not yet in vault) -->
  <div id="position-application" class="auth-container position-app-container" style="display: none;">
    <div class="auth-header">
      <h2>Select Your Position</h2>
      <p>Choose the rank you want to apply for</p>
    </div>

    <div class="position-cards">
      <label class="position-card" data-rank="board">
        <input type="radio" name="position-rank" value="board">
        <div class="position-card-inner">
          <span class="position-title board-color">Board</span>
          <span class="position-desc">Top-level leadership. Full access to all sessions and user management. Requires approval.</span>
        </div>
      </label>

      <label class="position-card" data-rank="sc">
        <input type="radio" name="position-rank" value="sc">
        <div class="position-card-inner">
          <span class="position-title sc-color">Senior Core</span>
          <span class="position-desc">Experienced members with elevated privileges. Can view JC sessions and shared content. Requires approval.</span>
        </div>
      </label>

      <label class="position-card" data-rank="jc">
        <input type="radio" name="position-rank" value="jc" checked>
        <div class="position-card-inner">
          <span class="position-title jc-color">Junior Core</span>
          <span class="position-desc">Entry-level members. Access to own sessions and shared content. Auto-approved.</span>
        </div>
      </label>
    </div>

    <button id="position-submit" class="auth-button email-btn" style="margin-top: 20px;">Apply</button>
    <div id="position-error" class="error-message"></div>
  </div>

  <script type="module" src="auth.js"></script>
</body>

</html>
