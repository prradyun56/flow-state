<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <div class="logo">◈ FlowState</div>
    <div class="tab-count" id="tab-count">0 tabs</div>
  </div>

  <div class="auth-section">
    <div class="user-info-container">
      <span id="user-email" class="user-info">Not signed in</span>
      <span id="last-sync" class="last-sync"></span>
    </div>
    <button id="auth-btn" class="icon-btn" title="Sign In">👤</button>
    <span id="sync-status" class="sync-icon" title="Sync status">☁</span>
  </div>

  <div id="approvals-section" class="approvals-section" style="display: none;">
    <h3>Pending Approvals</h3>
    <div id="approvals-list"></div>
  </div>


  <div class="save-section">
    <input type="text" id="session-name" placeholder="Session name...">
    <textarea id="session-notes" placeholder="Optional notes..."></textarea>
    <button id="save-btn" class="btn primary-btn">Save Session</button>
  </div>

  <div id="toast" class="toast hidden"></div>

  <div class="sessions-list" id="sessions-list">
    <!-- Session cards go here -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
